<meta name="htmx-config" content='{"selfRequestsOnly":false}'>
<script>
    document.addEventListener('htmx:configRequest', (evt) => {
        evt.detail.headers = [];
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.7/dist/htmx.min.js"></script>

<div hx-get="https://ola-tp1.onrender.com/" hx-trigger="load, mouseover" hx-target="#teste" hx-swap="innerHTML">
        Carregando dados de uma API externa...
    </div>
    <h1 id="teste"></h1>
  <!-- have a button POST a click via AJAX -->
  <button hx-get="https://ola-tp1.onrender.com/" hx-trigger="click" hx-swap="innerHTML">
    Click Me
  </button>

  Teste via localhost
  <form hx-post="http://localhost:3000/nomes"  hx-target="#resultado">
    <input type="text" name="nome" id="nome">
    <button type="submit">Salvar</button>
  </form>

  Teste via Render
  <form hx-post="https://ola-tp1.onrender.com/nomes"  hx-target="#resultado">
    <input type="text" name="nome" id="nome">
    <button type="submit">Salvar</button>
  </form>
<div id="resultado"></div>
